<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎪 631抽限定一番賞 🎪</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        /* 這裡保留你原本的 CSS 樣式，或是使用我之前給你的精美黑金版樣式 */
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .container { max-width: 400px; margin: auto; }
        .input-group { margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #2a2a2a; color: white; box-sizing: border-box; }
        .btn { width: 100%; background: #ff4757; color: white; border: none; padding: 16px; font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer; transition: 0.2s; }
        .btn:disabled { background: #444; color: #888; cursor: not-allowed; }
        #display-box { width: 260px; height: 380px; background: #1e1e1e; border: 2px solid #333; margin: 20px auto; border-radius: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        img { width: 100%; height: 100%; object-fit: cover; display: none; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #121212; z-index: 1000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div id="loading">📡 正在同步雲端獎池...</div>

    <div class="container">
        <h2>🎪 631 抽限定一番賞 🎪</h2>
        <div style="background:#1e1e1e; padding:15px; border-radius:12px; margin-bottom:15px;">
            <div style="font-size: 14px; color: #888;">獎箱剩餘</div>
            <div id="total-count" style="font-size: 32px; font-weight: bold; color: #ff4757;">--</div>
        </div>
        
        <div class="input-group"><input type="text" id="user-name" placeholder="請輸入暱稱..." oninput="checkStatus()"></div>
        <div class="input-group"><input type="text" id="draw-code" placeholder="請輸入 4 位抽獎代碼..." oninput="checkStatus()"></div>

        <div id="display-box">
            <span id="msg">READY</span>
            <img id="card-img" src="">
        </div>
        <div id="card-name" style="height: 1.5em; font-weight: bold; color: #eccc68; font-size: 20px;"></div>
        
        <button id="draw-btn" class="btn" onclick="draw()" disabled>請輸入正確代碼</button>
    </div>

    <script>
        // 1. --- Firebase 配置 (美國區) ---
        const firebaseConfig = {
            apiKey: "AIzaSyBZeZq-Sdej79LzHrdrB2-O5zE5WABCDQw",
            authDomain: "my-lucky-draw-78943.firebaseapp.com",
            projectId: "my-lucky-draw-78943",
            storageBucket: "my-lucky-draw-78943.firebasestorage.app",
            messagingSenderId: "923490067084",
            appId: "1:923490067084:web:218b1302bd4bb9ae8451a9",
            measurementId: "G-FQ8E402WQX",
            databaseURL: "https://my-lucky-draw-78943-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. --- 獎項圖片網址設定 (請依照你的圖片網址替換) ---
        const cardConfig = {
           {grade:"F", name:"F賞-13雙人卡", count:3, url:"https://i.postimg.cc/vHGfL9WX/10.jpg"},
{grade:"F", name:"F賞-37雙人卡", count:1, url:"https://i.postimg.cc/Y2zm99Jf/100.jpg"},
{grade:"F", name:"F賞-3單人卡", count:1, url:"https://i.postimg.cc/TY25Wx6m/101.jpg"},
{grade:"F", name:"F賞-13雙人卡", count:1, url:"https://i.postimg.cc/TY25Wx6D/102.jpg"},
{grade:"F", name:"F賞-23雙人卡", count:1, url:"https://i.postimg.cc/VLs0bw8X/103.jpg"},
{grade:"F", name:"F賞-3單人卡", count:1, url:"https://i.postimg.cc/L64gZSpt/104.jpg"},
{grade:"F", name:"F賞-3單人卡", count:1, url:"https://i.postimg.cc/Dyf4bhTd/105.jpg"},
{grade:"F", name:"F賞-13雙人卡", count:1, url:"https://i.postimg.cc/Kvc3gb2N/106.jpg"},
{grade:"F", name:"F賞-3單人卡", count:1, url:"https://i.postimg.cc/wTxRszp2/107.jpg"},
{grade:"F", name:"F賞-13雙人卡", count:1, url:"https://i.postimg.cc/025KJvs0/108.jpg"},

        };

        // 3. --- 代碼驗證邏輯 ---
        // (為了安全，這裡建議載入我給你的 Excel 裡的 631 組代碼)
        // 下面這行只是範例，正式版需要把 Excel 的代碼貼進去
        const validCodes = ["H4N2", "B9X1", "P5K8", "R2M7"]; 

        let pool = [];
        let used = {};

        db.ref().on('value', (snap) => {
            const data = snap.val();
            pool = data.pool || [];
            used = data.usedCodes || {};
            document.getElementById('loading').style.display = 'none';
            document.getElementById('total-count').innerText = pool.length + " / 631";
            checkStatus();
        });

        function checkStatus() {
            const name = document.getElementById('user-name').value.trim();
            const code = document.getElementById('draw-code').value.trim().toUpperCase();
            const btn = document.getElementById('draw-btn');
            
            // 驗證代碼是否正確且未使用過
            const isValid = validCodes.includes(code);
            const isUsed = used[code];

            if (pool.length === 0) {
                btn.innerText = "已全數售罄"; btn.disabled = true;
            } else if (name && isValid && !isUsed) {
                btn.innerText = "點我抽獎！"; btn.disabled = false;
            } else if (isUsed) {
                btn.innerText = "此代碼已用過"; btn.disabled = true;
            } else {
                btn.innerText = "代碼無效或格式錯誤"; btn.disabled = true;
            }
        }

        async function draw() {
            const name = document.getElementById('user-name').value.trim();
            const code = document.getElementById('draw-code').value.trim().toUpperCase();
            
            db.ref().transaction((data) => {
                if (data && data.pool && data.pool.length > 0) {
                    const p = data.pool;
                    // 如果是最後一張，強行指定為最後賞
                    const winGrade = p.length === 1 ? "last" : p.pop(); 
                    
                    if (!data.usedCodes) data.usedCodes = {};
                    data.usedCodes[code] = name;
                    
                    window.lastWinGrade = winGrade;
                    return data;
                }
            }, (err, committed) => {
                if (committed) showResult(window.lastWinGrade);
            });
        }

        function showResult(grade) {
            const res = cardConfig[grade] || cardConfig["F"];
            document.getElementById('msg').style.display = 'none';
            const img = document.getElementById('card-img');
            img.src = res.url;
            img.style.display = 'block';
            document.getElementById('card-name').innerText = res.name;
        }
        // 獎池初始化功能：執行一次即可填滿雲端獎池
function initPool() {
    // 根據你的圖片設定數量
    const config = {
        "S": 4,
        "A": 4,
        "B": 17,
        "C": 18,
        "D": 33,
        "E": 188,
        "F": 366
        // Last賞 1張會由程式自動在最後一抽判定，不放入一般隨機池
    };

    let newPool = [];
    
    // 依照數量產生獎券
    for (let grade in config) {
        for (let i = 0; i < config[grade]; i++) {
            newPool.push(grade);
        }
    }

    // 洗牌算法：把獎項順序完全打亂
    for (let i = newPool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newPool[i], newPool[j]] = [newPool[j], newPool[i]];
    }

    // 上傳到 Firebase (這會覆蓋掉舊的 pool 資料)
    db.ref().update({
        pool: newPool,
        usedCodes: {} // 同時重置所有已使用的代碼紀錄
    }).then(() => {
        alert("🎉 631 張獎券已成功裝填！代碼紀錄已清空。");
    }).catch((err) => {
        alert("錯誤：" + err.message);
    });
}
    </script>
</body>
</html>
