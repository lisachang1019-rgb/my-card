<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>抽卡紀錄版</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; }
        .card-area { width: 260px; height: 380px; background: #1e1e1e; border: 2px solid #333; margin: 20px auto; border-radius: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #card-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .btn { background: #ff4757; color: white; border: none; padding: 16px 40px; font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer; }
        .btn:disabled { background: #555; cursor: not-allowed; }
        #card-name { margin: 15px; font-size: 20px; color: #eccc68; min-height: 1.5em; }
    </style>
</head>
<body>
    <div class="container">
        <h2>✨ 抽卡紀錄機 ✨</h2>
        <div class="card-area">
            <span id="msg">等待抽取...</span>
            <img id="card-img" src="">
        </div>
        <div id="card-name"></div>
        <button id="draw-btn" class="btn" onclick="draw()">點我抽卡！</button>
        <div style="margin-top:10px; color:#888;">剩餘次數：<span id="rem-count">3</span></div>
    </div>

    <script>
        // --- 自動紀錄設定區 ---
        const FORM_ID = "193JTpxchU-FJUy7Ioy8Qx7t2bFZSimh9Y6A-FrsiXEc"; 
        const ENTRY_ID = "entry.1197525866";
        const FORM_URL = `https://docs.google.com/forms/d/e/${FORM_ID}/formResponse`;

        const MAX_DRAWS = 5;
        const cards = [
            { name: "隱藏版 SSR", weight: 1, url: "https://via.placeholder.com/260x380?text=SSR" },
            { name: "普通卡 01", weight: 50, url: "https://via.placeholder.com/260x380?text=Card01" }
        ];

        let drawCount = localStorage.getItem('drawCount') ? parseInt(localStorage.getItem('drawCount')) : 0;
        updateUI();

        function draw() {
            if (drawCount >= MAX_DRAWS) return;

            // 1. 隨機抽取
            const total = cards.reduce((s, c) => s + c.weight, 0);
            let r = Math.random() * total;
            let res = cards[0];
            for (const c of cards) { r -= c.weight; if (r <= 0) { res = c; break; } }

            // 2. 顯示結果
            document.getElementById('card-img').src = res.url;
            document.getElementById('card-img').style.display = 'block';
            document.getElementById('msg').style.display = 'none';
            document.getElementById('card-name').innerText = res.name;

            // 3. 【關鍵：發送到 Google 表單】
            sendToGoogleForm(res.name);

            // 4. 更新次數
            drawCount++;
            localStorage.setItem('drawCount', drawCount);
            updateUI();
        }

        function sendToGoogleForm(cardName) {
            const formData = new FormData();
            formData.append(ENTRY_ID, cardName);

            // 用背景傳送
            fetch(FORM_URL, {
                method: "POST",
                mode: "no-cors",
                body: formData
            });
        }

        function updateUI() {
            const rem = MAX_DRAWS - drawCount;
            document.getElementById('rem-count').innerText = rem;
            if (rem <= 0) {
                document.getElementById('draw-btn').disabled = true;
                document.getElementById('draw-btn').innerText = "次數已滿";
            }
        }
    </script>
</body>
</html>
