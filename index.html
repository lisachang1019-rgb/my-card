<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎪 雲端一番賞 🎪</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #121212; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .pool-card { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-bottom: 3px solid #ff4757; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #333; background: #2a2a2a; color: white; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; background: #ff4757; color: white; border: none; padding: 16px; font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer; }
        .btn:disabled { background: #444; color: #888; }
        #display-box { width: 260px; height: 380px; background: #1e1e1e; border: 2px solid #333; margin: 20px auto; border-radius: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #card-img { width: 100%; height: 100%; object-fit: cover; display: none; }
    </style>
</head>
<body>
    <div id="loading">📡 正在同步資料...</div>
    <div class="container">
        <h2>🎪 雲端一番賞 🎪</h2>
        <div class="pool-card">
            <div id="total-count" style="font-size: 32px; font-weight: bold; color: #ff4757;">-- 抽</div>
        </div>
        <input type="text" id="user-name" placeholder="輸入暱稱...">
        <input type="text" id="draw-code" placeholder="輸入代碼...">
        <div id="display-box"><img id="card-img"></div>
        <div id="card-name" style="margin-bottom:10px; color:#eccc68;"></div>
        <button id="draw-btn" class="btn" onclick="draw()">開始抽獎</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBZeZq-Sdej79LzHrdrB2-O5zE5WABCDQw",
            authDomain: "my-lucky-draw-78943.firebaseapp.com",
            projectId: "my-lucky-draw-78943",
            storageBucket: "my-lucky-draw-78943.firebasestorage.app",
            messagingSenderId: "923490067084",
            appId: "1:923490067084:web:218b1302bd4bb9ae8451a9",
            measurementId: "G-FQ8E402WQX",
            databaseURL: "https://my-lucky-draw-78943-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 這次我只放幾個當範例，確保妳能動，妳成功後再自己把 422 條補進去
        const cardConfig = {
            1: { grade: "F", name: "F賞", url: "https://i.postimg.cc/85fJ6X04/VSRV2985.jpg" },
            422: { grade: "last", name: "Last賞", url: "https://i.postimg.cc/hjy8Xt5p/AHRL4979.jpg" }
        };

        db.ref().on('value', (snap) => {
            const data = snap.val();
            document.getElementById('loading').style.display = 'none';
            document.getElementById('total-count').innerText = (data?.pool?.length || 0) + " 抽";
        });

        async function draw() {
            const name = document.getElementById('user-name').value;
            const code = document.getElementById('draw-code').value;
            if(!name || !code) return alert("請輸入資訊");

            db.ref().transaction((data) => {
                if (data && data.pool && data.pool.length > 0) {
                    const winGrade = data.pool.pop();
                    if(!data.usedCodes) data.usedCodes = {};
                    data.usedCodes[code] = name;
                    window.lastWin = winGrade;
                    return data;
                }
            }, (err, committed) => {
                if (committed) {
                    const res = Object.values(cardConfig).find(c => c.grade === window.lastWin);
                    document.getElementById('card-img').src = res.url;
                    document.getElementById('card-img').style.display = "block";
                    document.getElementById('card-name').innerText = res.name;
                }
            });
        }

        function initPool() {
            let p = [];
            for(let i=0; i<631; i++) p.push("F"); // 先全部填 F 測試用
            db.ref().set({ pool: p, usedCodes: {} }).then(() => alert("成功！"));
        }
    </script>
</body>
</html>
