<script>
    // --- 1. Firebase 配置 (請確保標點符號正確) ---
    const firebaseConfig = {
        apiKey: "AIzaSyBZeZq-Sdej79LzHrdrB2-O5zE5WABCDQw",
        authDomain: "my-lucky-draw-78943.firebaseapp.com",
        projectId: "my-lucky-draw-78943",
        storageBucket: "my-lucky-draw-78943.firebasestorage.app",
        messagingSenderId: "923490067084",
        appId: "1:923490067084:web:218b1302bd4bb9ae8451a9",
        measurementId: "G-FQ8E402WQX",
        databaseURL: "https://my-lucky-draw-78943-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- 2. 你的卡片清單 (修正了最後賞的空網址與結構) ---
    const cardConfig = {
        // ... (這裡保留你原本 400 多行的內容，但請確保最後一行如下)
        422: { grade: "last", name: "last賞-3.0娃娃", count: 1, url: "這裡記得補上最後賞圖片網址" }
    };

    let currentPool = [];
    let usedCodes = {};

    // 監聽雲端資料
    db.ref().on('value', (snap) => {
        const data = snap.val();
        if (!data) return;
        currentPool = data.pool || [];
        usedCodes = data.usedCodes || {};
        document.getElementById('loading').style.display = 'none';
        document.getElementById('total-count').innerText = currentPool.length + " 抽";
        checkStatus();
    });

    function checkStatus() {
        const name = document.getElementById('user-name').value.trim();
        const code = document.getElementById('draw-code').value.trim().toUpperCase();
        const btn = document.getElementById('draw-btn');
        
        if (currentPool.length === 0) {
            btn.innerText = "已全數售罄";
            btn.disabled = true;
        } else if (name && code) {
            btn.innerText = "開始抽獎！";
            btn.disabled = false;
        } else {
            btn.innerText = "請輸入完整資訊";
            btn.disabled = true;
        }
    }

    async function draw() {
        const name = document.getElementById('user-name').value.trim();
        const code = document.getElementById('draw-code').value.trim().toUpperCase();

        // 檢查代碼是否用過
        if (usedCodes[code]) {
            alert("此代碼已被 " + usedCodes[code] + " 使用過囉！");
            return;
        }

        db.ref().transaction((data) => {
            if (data && data.pool && data.pool.length > 0) {
                const p = data.pool;
                const idx = Math.floor(Math.random() * p.length);
                const winGrade = p.splice(idx, 1)[0]; // 抽中一個等級 (如 "S")
                
                if (!data.usedCodes) data.usedCodes = {};
                data.usedCodes[code] = name; // 紀錄使用者
                
                window.lastWin = winGrade;
                return data;
            }
        }, (err, committed) => {
            if (committed) {
                showResult(window.lastWin);
            } else {
                alert("抽獎失敗，請稍後再試！");
            }
        });
    }

    // --- 3. 關鍵修正：讓程式能在清單中找到對應等級的圖片 ---
    function showResult(grade) {
        // 從你的 cardConfig 中篩選出所有符合該等級的選項
        const matches = Object.values(cardConfig).filter(item => item.grade === grade);
        
        // 隨機選出一張該等級的圖片 (增加驚喜感)
        const res = matches.length > 0 
            ? matches[Math.floor(Math.random() * matches.length)] 
            : { name: "未知獎項", url: "" };

        document.getElementById('msg').style.display = 'none';
        const img = document.getElementById('card-img');
        img.src = res.url;
        img.style.display = 'block';
        document.getElementById('card-name').innerText = "【" + grade + "賞】" + res.name;
    }

    // --- 4. 初始化功能 (裝填 631 張獎券) ---
    function initPool() {
        const config = { "S": 4, "A": 4, "B": 17, "C": 18, "D": 33, "E": 188, "F": 366 };
        let newPool = [];
        for (let g in config) {
            for (let i = 0; i < config[g]; i++) {
                newPool.push(g);
            }
        }
        // 洗牌
        for (let i = newPool.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newPool[i], newPool[j]] = [newPool[j], newPool[i]];
        }
        db.ref().update({
            pool: newPool,
            usedCodes: {}
        }).then(() => alert("🎉 631 張獎券裝填完畢！"));
    }
</script>
