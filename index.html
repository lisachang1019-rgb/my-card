<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>幸運抽卡機</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 20px; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { max-width: 400px; width: 100%; }
        .input-group { margin-bottom: 15px; text-align: left; background: #1e1e1e; padding: 15px; border-radius: 12px; }
        label { display: block; margin-bottom: 8px; color: #aaa; font-size: 14px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #2a2a2a; color: white; box-sizing: border-box; font-size: 16px; }
        .card-area { width: 260px; height: 380px; background: #1e1e1e; border: 2px solid #333; margin: 20px auto; border-radius: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #card-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .btn { width: 100%; background: #ff4757; color: white; border: none; padding: 16px; font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 0 #cc3a47; transition: 0.2s; }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        .btn:disabled { background: #444; box-shadow: none; color: #888; cursor: not-allowed; }
        #card-name { margin: 15px; font-size: 22px; color: #eccc68; font-weight: bold; min-height: 1.5em; }
        .info { margin-top: 15px; color: #888; font-size: 14px; }
        #secret-reset { color: #121212; cursor: pointer; margin-top: 30px; font-size: 12px; user-select: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>✨ 幸運抽卡機 ✨</h2>
        
        <div class="input-group">
            <label>輸入暱稱後開始抽獎：</label>
            <input type="text" id="user-name" placeholder="請輸入你的名字..." oninput="checkStatus()">
        </div>

        <div class="card-area">
            <span id="msg">等待中...</span>
            <img id="card-img" src="">
        </div>
        
        <div id="card-name"></div>
        <button id="draw-btn" class="btn" onclick="draw()" disabled>請先輸入暱稱</button>
        <div class="info">剩餘抽獎次數：<span id="rem-count">--</span></div>
        <div id="secret-reset" onclick="resetAll()">.</div>
    </div>

    <script>
        // ================= 根據你的網址自動填入 =================
        const FORM_ID = "1FAIpQLSdKRudwWeJy9a_iRpD2JKQqERtOteRwF2P4phoHtPQpqYVX_A"; 
        const ENTRY_NAME = "entry.1434310166"; // 暱稱欄位
        const ENTRY_CARD = "entry.1197525866"; // 卡片欄位
        const MAX_DRAWS = 3; 

        const cards = [
            { name: "隱藏版 SSR", weight: 1, url: "https://via.placeholder.com/260x380?text=SSR" },
            { name: "普通卡 01", weight: 50, url: "https://via.placeholder.com/260x380?text=Card01" },
            { name: "普通卡 02", weight: 50, url: "https://via.placeholder.com/260x380?text=Card02" }
        ];
        // ========================================================

        let drawCount = localStorage.getItem('myDrawCount') ? parseInt(localStorage.getItem('myDrawCount')) : 0;
        updateUI();

        function checkStatus() {
            const name = document.getElementById('user-name').value.trim();
            const btn = document.getElementById('draw-btn');
            if (drawCount >= MAX_DRAWS) {
                btn.disabled = true;
                btn.innerText = "次數已用完";
            } else if (name === "") {
                btn.disabled = true;
                btn.innerText = "請先輸入暱稱";
            } else {
                btn.disabled = false;
                btn.innerText = "點我抽卡！";
            }
        }

        function draw() {
            const userName = document.getElementById('user-name').value.trim();
            if (!userName || drawCount >= MAX_DRAWS) return;

            const totalWeight = cards.reduce((s, c) => s + c.weight, 0);
            let random = Math.random() * totalWeight;
            let result = cards[0];
            for (const card of cards) { random -= card.weight; if (random <= 0) { result = card; break; } }

            document.getElementById('card-img').src = result.url;
            document.getElementById('card-img').style.display = 'block';
            document.getElementById('msg').style.display = 'none';
            document.getElementById('card-name').innerText = result.name;

            // 發送至 Google 表單
            sendToGoogle(userName, result.name);

            drawCount++;
            localStorage.setItem('myDrawCount', drawCount);
            updateUI();
            checkStatus();
        }

        function sendToGoogle(name, card) {
            // 使用 Image Beacon 技術，這是不會被攔截的最穩發送法
            const finalUrl = `https://docs.google.com/forms/d/e/${FORM_ID}/formResponse?${ENTRY_NAME}=${encodeURIComponent(name)}&${ENTRY_CARD}=${encodeURIComponent(card)}&submit=Submit`;
            const beacon = new Image();
            beacon.src = finalUrl;
        }

        function updateUI() {
            document.getElementById('rem-count').innerText = MAX_DRAWS - drawCount;
        }

        function resetAll() {
            if (confirm("管理員你好，要重置這次數嗎？")) {
                localStorage.removeItem('myDrawCount');
                drawCount = 0;
                updateUI();
                checkStatus();
                alert("已重置成功！");
            }
        }
    </script>
</body>
</html>
