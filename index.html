<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎪 專屬抽獎機 🎪</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; }
        .pool-card { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-bottom: 3px solid #ff4757; }
        .total-rem { font-size: 32px; font-weight: bold; color: #ff4757; }
        .card-area { width: 260px; height: 380px; background: #1e1e1e; border: 2px solid #333; margin: 20px auto; border-radius: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #card-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        #rolling-text { font-size: 24px; color: #ff4757; font-weight: bold; display: none; }
        .input-group { margin-bottom: 10px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #2a2a2a; color: white; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; background: #ff4757; color: white; border: none; padding: 16px; font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 0 #cc3a47; transition: 0.1s; }
        .btn:disabled { background: #444; color: #888; box-shadow: none; cursor: not-allowed; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #121212; z-index: 1000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div id="loading">📡 正在連線雲端獎池...</div>

    <div class="container">
        <h2>🎪 限量抽獎機 🎪</h2>
        <div class="pool-card">
            <div style="font-size: 14px; color: #888;">目前獎箱剩餘</div>
            <div class="total-rem" id="total-count">--</div>
        </div>
        
        <div class="input-group">
            <input type="text" id="user-name" placeholder="輸入你的暱稱..." oninput="checkStatus()">
        </div>
        <div class="input-group">
            <input type="text" id="draw-code" placeholder="輸入 4 位抽獎代碼..." oninput="checkStatus()">
        </div>

        <div class="card-area" id="display-box">
            <span id="msg" style="color: #444;">READY</span>
            <div id="rolling-text">???</div>
            <img id="card-img" src="">
        </div>
        <div id="card-name" style="margin-bottom:15px; font-weight:bold; height:1.2em; color: #eccc68; font-size: 20px;"></div>
        
        <button id="draw-btn" class="btn" onclick="draw()" disabled>請輸入代碼</button>
    </div>

    <script>
        // 1. --- Firebase 設定 (美國區正確格式) ---
        const firebaseConfig = {
            apiKey: "AIzaSyBZeZq-Sdej79LzHrdrB2-O5zE5WABCDQw",
            authDomain: "my-lucky-draw-78943.firebaseapp.com",
            projectId: "my-lucky-draw-78943",
            storageBucket: "my-lucky-draw-78943.firebasestorage.app",
            messagingSenderId: "923490067084",
            appId: "1:923490067084:web:218b1302bd4bb9ae8451a9",
            measurementId: "G-FQ8E402WQX",
            databaseURL: "https://my-lucky-draw-78943-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. --- 獎項設定 ---
        const cardConfig = [
            {id:1, name:"F賞-3單人卡", count:1, url:"https://i.postimg.cc/446p9wht/1.jpg"},
            {id:2, name:"F賞-13雙人卡", count:3, url:"https://i.postimg.cc/vHGfL9WX/10.jpg"},
            {id:3, name:"F賞-37雙人卡", count:1, url:"https://i.postimg.cc/Y2zm99Jf/100.jpg"}
        ];

        let currentPool = [];
        let usedCodes = {}; // 用來存放哪些代碼被用過了

        // 監聽雲端數據
        db.ref().on('value', (snap) => {
            const data = snap.val();
            currentPool = data?.pool || [];
            usedCodes = data?.usedCodes || {}; // 從雲端讀取已使用的代碼
            document.getElementById('loading').style.display = 'none';
            document.getElementById('total-count').innerText = currentPool.length + " 抽";
            checkStatus();
        });

        function checkStatus() {
            const name = document.getElementById('user-name').value.trim();
            const code = document.getElementById('draw-code').value.trim().toUpperCase();
            const btn = document.getElementById('draw-btn');
            
            // 檢查代碼是否存在於我們的 631 組名單中 (這裡待會幫你生成)
            const isValidFormat = /^[A-Z0-9]{4}$/.test(code); 
            const isUsed = usedCodes[code];

            if (currentPool.length === 0) {
                btn.innerText = "已全數售罄";
                btn.disabled = true;
            } else if (name && isValidFormat && !isUsed) {
                btn.innerText = "代碼正確，開始抽獎！";
                btn.disabled = false;
            } else if (isUsed) {
                btn.innerText = "此代碼已使用過";
                btn.disabled = true;
            } else {
                btn.innerText = "請輸入正確代碼";
                btn.disabled = true;
            }
        }

        async function draw() {
            const name = document.getElementById('user-name').value.trim();
            const code = document.getElementById('draw-code').value.trim().toUpperCase();
            
            // 使用 Firebase 事務處理，確保不會兩個人同時抽中同一張
            db.ref().transaction((currentData) => {
                if (currentData && currentData.pool && currentData.pool.length > 0) {
                    if (currentData.usedCodes && currentData.usedCodes[code]) {
                        return; // 代碼已用過，停止
                    }
                    const p = currentData.pool;
                    const idx = Math.floor(Math.random() * p.length);
                    const winId = p[idx];
                    p.splice(idx, 1);
                    
                    if (!currentData.usedCodes) currentData.usedCodes = {};
                    currentData.usedCodes[code] = name; // 標記代碼已被此人使用
                    
                    window.lastWin = winId;
                    return currentData;
                }
            }, (err, committed) => {
                if (committed) {
                    showEffect(window.lastWin);
                } else {
                    alert("抽獎失敗，可能是代碼已被使用或獎池空了。");
                }
            });
        }

        function showEffect(winId) {
            const res = cardConfig.find(c => c.id === winId);
            document.getElementById('msg').style.display = 'none';
            document.getElementById('rolling-text').style.display = 'block';
            document.getElementById('draw-btn').disabled = true;
            
            setTimeout(() => {
                document.getElementById('rolling-text').style.display = 'none';
                const img = document.getElementById('card-img');
                img.src = res.url;
                img.style.display = 'block';
                document.getElementById('card-name').innerText = res.name;
            }, 1500);
        }
    </script>
</body>
</html>
