<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抽獎測試版</title>
    <style>
        body { background: #121212; color: white; text-align: center; font-family: sans-serif; padding: 20px; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 15px; max-width: 350px; margin: auto; }
        input { width: 80%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #2a2a2a; color: white; }
        button { background: #ff4757; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #444; }
        #status { margin-top: 15px; color: #eccc68; font-size: 14px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>✨ 抽獎機除錯版 ✨</h2>
        <input type="text" id="user-name" placeholder="輸入暱稱...">
        <br>
        <button id="draw-btn" onclick="testDraw()">點我抽卡</button>
        <div id="status">準備就緒</div>
        <div id="result-name" style="margin-top:10px; font-weight:bold; color:#ff4757;"></div>
    </div>

    <script>
        // --- 這是根據你提供的截圖填寫的資料 ---
        const FORM_ID = "1FAIpQLSdKRudwWeJy9a_iRpD2JKQqERtOteRwF2P4phoHtPQpqYVX_A"; 
        const ENTRY_ID = "entry.1197525866"; // 你網址中的編號
        
        function testDraw() {
            const name = document.getElementById('user-name').value.trim();
            const statusDiv = document.getElementById('status');
            
            if (!name) {
                alert("請先輸入暱稱！");
                return;
            }

            statusDiv.innerText = "正在傳送至表單...";
            document.getElementById('draw-btn').disabled = true;

            const cardName = "測試卡片";
            document.getElementById('result-name').innerText = "抽中：" + cardName;

            // 構建傳送資料
            const formData = new FormData();
            // 嘗試把暱稱和卡片都傳到同一個編號試試看 (因為你網址只有一個編號)
            formData.append(ENTRY_ID, name + " - " + cardName);

            const FORM_URL = `https://docs.google.com/forms/d/e/${FORM_ID}/formResponse`;

            fetch(FORM_URL, {
                method: "POST",
                mode: "no-cors",
                body: formData
            }).then(() => {
                statusDiv.innerText = "✅ 傳送指令已發出！請檢查表單。";
                statusDiv.style.color = "#2ecc71";
                alert("傳送完畢！請去 Google 表單看有沒有增加一筆記錄。");
            }).catch((err) => {
                statusDiv.innerText = "❌ 傳送失敗，請檢查網路。";
                console.error(err);
            });
        }
    </script>
</body>
</html>
