        db.ref().on('value', (snap) => {
            const data = snap.val();
            document.getElementById('loading').style.display = 'none';
            document.getElementById('total-count').innerText = (data?.pool?.length || 0) + " 抽";
        });

        async function draw() {
            const name = document.getElementById('user-name').value;
            const code = document.getElementById('draw-code').value;
            if(!name || !code) return alert("請輸入資訊");

            db.ref().transaction((data) => {
                if (data && data.pool && data.pool.length > 0) {
                    const winGrade = data.pool.pop();
                    if(!data.usedCodes) data.usedCodes = {};
                    data.usedCodes[code] = name;
                    window.lastWin = winGrade;
                    return data;
                }
            }, (err, committed) => {
                if (committed) {
                    const res = Object.values(cardConfig).find(c => c.grade === window.lastWin);
                    document.getElementById('card-img').src = res.url;
                    document.getElementById('card-img').style.display = "block";
                    document.getElementById('card-name').innerText = res.name;
                }
            });
        }

        function initPool() {
            let p = [];
            for(let i=0; i<631; i++) p.push("F"); // 先全部填 F 測試用
            db.ref().set({ pool: p, usedCodes: {} }).then(() => alert("成功！"));
        }
