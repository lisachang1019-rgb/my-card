        // 3. --- 代碼驗證邏輯 ---
        // (為了安全，這裡建議載入我給你的 Excel 裡的 631 組代碼)
        // 下面這行只是範例，正式版需要把 Excel 的代碼貼進去
        const validCodes = ["H4N2", "B9X1", "P5K8", "R2M7"]; 

        let pool = [];
        let used = {};

        db.ref().on('value', (snap) => {
            const data = snap.val();
            pool = data.pool || [];
            used = data.usedCodes || {};
            document.getElementById('loading').style.display = 'none';
            document.getElementById('total-count').innerText = pool.length + " / 631";
            checkStatus();
        });

        function checkStatus() {
            const name = document.getElementById('user-name').value.trim();
            const code = document.getElementById('draw-code').value.trim().toUpperCase();
            const btn = document.getElementById('draw-btn');
            
            // 驗證代碼是否正確且未使用過
            const isValid = validCodes.includes(code);
            const isUsed = used[code];

            if (pool.length === 0) {
                btn.innerText = "已全數售罄"; btn.disabled = true;
            } else if (name && isValid && !isUsed) {
                btn.innerText = "點我抽獎！"; btn.disabled = false;
            } else if (isUsed) {
                btn.innerText = "此代碼已用過"; btn.disabled = true;
            } else {
                btn.innerText = "代碼無效或格式錯誤"; btn.disabled = true;
            }
        }

        async function draw() {
            const name = document.getElementById('user-name').value.trim();
            const code = document.getElementById('draw-code').value.trim().toUpperCase();
            
            db.ref().transaction((data) => {
                if (data && data.pool && data.pool.length > 0) {
                    const p = data.pool;
                    // 如果是最後一張，強行指定為最後賞
                    const winGrade = p.length === 1 ? "last" : p.pop(); 
                    
                    if (!data.usedCodes) data.usedCodes = {};
                    data.usedCodes[code] = name;
                    
                    window.lastWinGrade = winGrade;
                    return data;
                }
            }, (err, committed) => {
                if (committed) showResult(window.lastWinGrade);
            });
        }

        function showResult(grade) {
            const res = cardConfig[grade] || cardConfig["F"];
            document.getElementById('msg').style.display = 'none';
            const img = document.getElementById('card-img');
            img.src = res.url;
            img.style.display = 'block';
            document.getElementById('card-name').innerText = res.name;
        }
        // ... 原本的 showResult 函數 ...
        function showResult(grade) {
            const res = cardConfig[grade] || cardConfig["F"];
            document.getElementById('msg').style.display = 'none';
            const img = document.getElementById('card-img');
            img.src = res.url;
            img.style.display = 'block';
            document.getElementById('card-name').innerText = res.name;
        }

      
        }
    </script>
