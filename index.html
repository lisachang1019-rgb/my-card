<script>
    // Firebase 設定 (請維持您原本的設定)
    const firebaseConfig = {
        apiKey: "AIzaSyBZeZq-Sdej79LzHrdrB2-O5zE5WABCDQw",
        authDomain: "my-lucky-draw-78943.firebaseapp.com",
        projectId: "my-lucky-draw-78943",
        storageBucket: "my-lucky-draw-78943.firebasestorage.app",
        messagingSenderId: "923490067084",
        appId: "1:923490067084:web:218b1302bd4bb9ae8451a9",
        measurementId: "G-FQ8E402WQX",
        databaseURL: "https://my-lucky-draw-78943-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 卡片資訊池 (請在此處貼上您的 422 條資料)
    const cardConfig = [
        {grade:"F", name:"F賞-13雙人卡", count:3, url:"https://i.postimg.cc/vHGfL9WX/10.jpg"},
{grade:"F", name:"F賞-37雙人卡", count:1, url:"https://i.postimg.cc/Y2zm99Jf/100.jpg"},
{grade:"F", name:"F賞-3單人卡", count:1, url:"https://i.postimg.cc/TY25Wx6m/101.jpg"},
{grade:"F", name:"F賞-13雙人卡", count:1, url:"https://i.postimg.cc/TY25Wx6D/102.jpg"},
{grade:"F", name:"F賞-23雙人卡", count:1, url:"https://i.postimg.cc/VLs0bw8X/103.jpg"},
{grade:"F", name:"F賞-3單人卡", count:1, url:"https://i.postimg.cc/L64gZSpt/104.jpg"},
{grade:"F", name:"F賞-3單人卡", count:1, url:"https://i.postimg.cc/Dyf4bhTd/105.jpg"},
{grade:"F", name:"F賞-13雙人卡", count:1, url:"https://i.postimg.cc/Kvc3gb2N/106.jpg"},
{grade:"F", name:"F賞-3單人卡", count:1, url:"https://i.postimg.cc/wTxRszp2/107.jpg"},
{grade:"F", name:"F賞-13雙人卡", count:1, url:"https://i.postimg.cc/025KJvs0/108.jpg"}

    ];

    // 監聽雲端資料
    db.ref().on('value', (snap) => {
        const data = snap.val();
        document.getElementById('loading').style.display = 'none';
        if (data) {
            // 更新剩餘抽數
            document.getElementById('total-count').innerText = (data.pool ? data.pool.length : 0) + " 抽";
            
            // 更新紀錄清單 (顯示格式：暱稱 抽中了 獎項)
            if (data.usedCodes) {
                const records = Object.entries(data.usedCodes).reverse(); 
                const recordHtml = records.map(([code, info]) => {
                    // 這裡判斷 info 是否為物件（新版格式）或字串（舊版格式）
                    const displayName = typeof info === 'object' ? `${info.user} 抽中了 [${info.prize}]` : `${info} 使用了代碼 ${code}`;
                    return `<div class="record-item">✨ ${displayName}</div>`;
                }).join('');
                document.getElementById('record-list').innerHTML = recordHtml;
            }
        }
    });

    async function draw() {
        const name = document.getElementById('user-name').value;
        const code = document.getElementById('draw-code').value;
        const btn = document.getElementById('draw-btn');
        
        if(!name || !code) return alert("請輸入暱稱與代碼");
        btn.disabled = true;

        db.ref().transaction((data) => {
            if (data && data.pool && data.pool.length > 0) {
                if (data.usedCodes && data.usedCodes[code]) {
                    window.drawError = "此代碼已使用過";
                    return; 
                }
                // 抽出等級 (例如 "F")
                const winGrade = data.pool.pop();
                
                // 找到對應的獎品名稱
                const prizeObj = cardConfig.find(c => c.grade === winGrade) || {name: "未知獎項"};
                
                if(!data.usedCodes) data.usedCodes = {};
                // 將「使用者」與「獎項名稱」一起存入紀錄
                data.usedCodes[code] = { user: name, prize: prizeObj.name };
                
                window.lastWin = winGrade;
                return data;
            } else {
                window.drawError = "獎池已空";
                return;
            }
        }, (err, committed) => {
            if (committed) {
                startRollEffect(name);
            } else {
                alert(window.drawError || "抽獎失敗");
                btn.disabled = false;
            }
        });
    }

    function startRollEffect(userName) {
        let count = 0;
        const cardImg = document.getElementById('card-img');
        const cardName = document.getElementById('card-name');
        const btn = document.getElementById('draw-btn');
        cardImg.style.display = "block";

        const timer = setInterval(() => {
            // 隨機切換圖片製造滾動感
            const randomShow = cardConfig[Math.floor(Math.random() * cardConfig.length)];
            cardImg.src = randomShow.url;
            cardName.innerText = "🎲 正在開獎中...";
            count++;

            if (count > 25) { 
                clearInterval(timer);
                // 顯示最後結果
                const result = cardConfig.find(c => c.grade === window.lastWin);
                cardImg.src = result.url;
                cardName.innerText = `🎉 恭喜！${result.name}`;
                btn.disabled = false;
            }
        }, 60); 
    }
</script>
