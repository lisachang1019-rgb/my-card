        // 監聽雲端剩餘張數與紀錄
        db.ref().on('value', (snap) => {
            const data = snap.val();
            document.getElementById('loading').style.display = 'none';
            if (data) {
                // 更新剩餘抽數
                document.getElementById('total-count').innerText = (data.pool ? data.pool.length : 0) + " 抽";
                
                // 更新中獎紀錄顯示
                if (data.usedCodes) {
                    const records = Object.entries(data.usedCodes).reverse(); // 最新紀錄排前面
                    const recordHtml = records.map(([code, name]) => `<div class="record-item">👤 ${name} 使用了代碼 [${code}]</div>`).join('');
                    document.getElementById('record-list').innerHTML = recordHtml || "尚未有抽獎紀錄";
                }
            }
        });

        // 抽獎主程式
        async function draw() {
            const name = document.getElementById('user-name').value;
            const code = document.getElementById('draw-code').value;
            const btn = document.getElementById('draw-btn');
            
            if(!name || !code) return alert("請輸入暱稱與抽獎代碼");

            // 禁用按鈕防止重複點擊
            btn.disabled = true;

            db.ref().transaction((data) => {
                if (data && data.pool && data.pool.length > 0) {
                    // 檢查代碼是否用過
                    if (data.usedCodes && data.usedCodes[code]) {
                        window.drawError = "此代碼已使用過";
                        return; 
                    }
                    // 抽出獎項
                    const winGrade = data.pool.pop();
                    if(!data.usedCodes) data.usedCodes = {};
                    data.usedCodes[code] = name;
                    window.lastWin = winGrade;
                    return data;
                } else {
                    window.drawError = "獎池已空或資料錯誤";
                    return;
                }
            }, (err, committed) => {
                if (committed) {
                    startRollEffect(name);
                } else {
                    alert(window.drawError || "抽獎失敗");
                    btn.disabled = false;
                }
            });
        }

        // 滾動效果函式
        function startRollEffect(userName) {
            let count = 0;
            const cardImg = document.getElementById('card-img');
            const cardName = document.getElementById('card-name');
            const btn = document.getElementById('draw-btn');
            cardImg.style.display = "block";

            const timer = setInterval(() => {
                // 隨機閃爍效果
                const randomShow = cardConfig[Math.floor(Math.random() * cardConfig.length)];
                cardImg.src = randomShow.url;
                cardName.innerText = "🎲 正在開獎中...";
                count++;

                if (count > 25) { // 滾動次數
                    clearInterval(timer);
                    // 顯示最終結果
                    const result = cardConfig.find(c => c.grade === window.lastWin) || cardConfig[0];
                    cardImg.src = result.url;
                    cardName.innerText = `🎉 恭喜 ${userName} 抽中：${result.name}`;
                    btn.disabled = false;
                    
                    // 如果有 Google Form 紀錄功能，請在此呼叫
                    // sendToGoogleForm(userName, result.name);
                }
            }, 60); // 閃爍速度
        }

        // 初始化獎池（僅供開發者在 Console 使用）
        function initPool(totalCards = 631) {
            let p = [];
            for(let i=0; i<totalCards; i++) p.push("F"); 
            db.ref().set({ pool: p, usedCodes: {} }).then(() => alert("獎池初始化成功！"));
        }
    </script>
